default_language_version:
  python: python3

repos:
  # ── Generated docs ─────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: update-repository-map
        name: update repository map
        entry: python scripts/update_repository_map.py
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|docs/|scripts/|src/|tests/|pyproject\.toml|README\.md|\.github/|\.pre-commit-config\.yaml)

  # ── Ruff: lint + format (fast, replaces flake8/isort/black) ────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff format

  # ── General hooks ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        name: protect main branch
        args: [--branch, main, --branch, develop]

  # ── Type checking ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: mypy type check
        args: [--strict]
        additional_dependencies: [pytest]
