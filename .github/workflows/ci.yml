name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Job 1: Format ─────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Check formatting
        run: uv run ruff format --check --diff .

  # ── Job 2: Lint ───────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

  # ── Job 3: Type check ─────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --dev

      - name: Mypy
        run: uv run mypy src --strict

  # ── Job 4: Test ───────────────────────────────────────────────────────
  test:
    name: Test · py${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --dev

      - name: Run tests
        run: uv run pytest -ra --strict-markers --cov --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Gate: all must pass ───────────────────────────────────────────────
  ci-pass:
    name: ✅ CI passed
    if: always()
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, test]
    steps:
      - name: Check results
        run: |
          echo "format:  ${{ needs.format.result }}"
          echo "lint:    ${{ needs.lint.result }}"
          echo "typecheck:${{ needs.typecheck.result }}"
          echo "test:    ${{ needs.test.result }}"
          for r in "${{ needs.format.result }}" "${{ needs.lint.result }}" "${{ needs.typecheck.result }}" "${{ needs.test.result }}"; do
            if [ "$r" != "success" ]; then
              echo "::error::CI gate failed — one or more jobs did not succeed"
              exit 1
            fi
          done
          echo "All checks passed ✓"
